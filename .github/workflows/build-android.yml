name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK and build tools
        run: |
          sdkmanager "ndk;25.2.9519653" "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libglib2.0-dev librsvg2-dev libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: npm install

      - name: Init Android project
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: |
          rustup target add aarch64-linux-android
          npm run tauri -- android init --ci

      - name: Build Android APK (debug, arm64 only)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: |
          npm run tauri -- android build --apk --debug --target aarch64 --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-arm64-debug
          path: src-tauri/gen/android/app/build/outputs/apk/arm64/debug/*.apk

      - name: Upload APK to gofile.io
        run: |
          APK_PATH=$(ls src-tauri/gen/android/app/build/outputs/apk/arm64/debug/*.apk | head -n 1)
          echo "Uploading $APK_PATH"
          RESPONSE=$(curl -s -F file=@"$APK_PATH" https://upload.gofile.io/uploadfile)
          echo "$RESPONSE" > upload-response.json
          cat upload-response.json

      - name: Save upload response
        uses: actions/upload-artifact@v4
        with:
          name: gofile-response
          path: upload-response.json
